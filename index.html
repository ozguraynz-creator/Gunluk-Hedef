<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Derimod Hedef</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome İkonları (Telefon Uyumlu) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Tarayıcıda JSX çalıştırmak için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Kompakt görünüm için özel kaydırma çubuğu */
        .styled-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .styled-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .styled-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .styled-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-neutral-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Global OSF State
            const [globalOsf, setGlobalOsf] = useState({ ayakkabi: '', giysi: '', canta: '', aksesuar: '' });
            
            // Paneller ve Görünüm
            const [showOsfPanel, setShowOsfPanel] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);

            // Personel Şablonu
            const emptyEmployee = { ayakkabiAdet: '', giysiAdet: '', cantaAdet: '', aksesuarAdet: '', gerceklesenCiro: '' };

            const [employees, setEmployees] = useState([]);
            const [newEmpName, setNewEmpName] = useState('');
            const [saveMessage, setSaveMessage] = useState('');

            // Güvenli ID oluşturucu (Eski telefonlar için destek)
            const generateId = () => {
                return window.crypto && crypto.randomUUID 
                    ? crypto.randomUUID() 
                    : Math.random().toString(36).substring(2, 15);
            };

            // Veri Yükleme ve Ana Ekran İkonu (PWA) Ayarları
            useEffect(() => {
                const savedData = localStorage.getItem('derimodHedefPhoneApp');
                if (savedData) {
                    const parsedData = JSON.parse(savedData);
                    if (parsedData.globalOsf) setGlobalOsf(parsedData.globalOsf);
                    if (parsedData.showOsfPanel !== undefined) setShowOsfPanel(parsedData.showOsfPanel);
                    if (parsedData.employees) {
                        setEmployees(parsedData.employees.map(emp => ({ ...emp, gerceklesenCiro: emp.gerceklesenCiro || '' })));
                    }
                }

                // Ana Ekran İkonu (Gönderdiğiniz resme benzer vektörel logo)
                const svgIcon = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                    <rect width="512" height="512" rx="115" fill="#f47b20"/>
                    <path d="M256 0h256v512H256z" fill="#8d1d58"/>
                    <path d="M100 0h200v512H100z" fill="#e31837"/>
                    <path d="M256 256m-140 0a140 140 0 1 0 280 0a140 140 0 1 0 -280 0" fill="#e5005c"/>
                    <text x="256" y="275" font-family="Arial, sans-serif" font-weight="900" font-size="82" fill="#ffffff" text-anchor="middle" letter-spacing="1">DERİMOD</text>
                </svg>`.trim();

                const encodedSvg = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgIcon)));

                let appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
                if (!appleIcon) {
                    appleIcon = document.createElement('link');
                    appleIcon.rel = 'apple-touch-icon';
                    document.head.appendChild(appleIcon);
                }
                appleIcon.href = encodedSvg;

                const manifest = {
                    name: "Derimod Hedef",
                    short_name: "Derimod",
                    display: "standalone",
                    background_color: "#000000",
                    theme_color: "#000000",
                    icons: [{ src: encodedSvg, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
                };
                
                const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                const manifestUrl = URL.createObjectURL(manifestBlob);
                
                let manifestLink = document.querySelector('link[rel="manifest"]');
                if (!manifestLink) {
                    manifestLink = document.createElement('link');
                    manifestLink.rel = 'manifest';
                    document.head.appendChild(manifestLink);
                }
                manifestLink.href = manifestUrl;

                let themeColor = document.querySelector('meta[name="theme-color"]');
                if (!themeColor) {
                    themeColor = document.createElement('meta');
                    themeColor.name = 'theme-color';
                    document.head.appendChild(themeColor);
                }
                themeColor.content = '#000000';

                const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(err => console.warn(err));
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            };

            const handleAddEmployee = (e) => {
                e.preventDefault();
                if (!newEmpName.trim()) return;
                setEmployees([...employees, { id: generateId(), name: newEmpName.trim(), ...emptyEmployee }]);
                setNewEmpName('');
            };

            const handleDeleteEmployee = (id) => setEmployees(employees.filter(emp => emp.id !== id));
            
            const handleOsfChange = (field, value) => {
                if (value !== '' && !/^\d*\.?\d*$/.test(value)) return;
                setGlobalOsf({ ...globalOsf, [field]: value });
            };

            const handleEmployeeChange = (id, field, value) => {
                if (value !== '' && !/^\d*\.?\d*$/.test(value)) return;
                setEmployees(employees.map(emp => emp.id === id ? { ...emp, [field]: value } : emp));
            };

            const handleSave = () => {
                localStorage.setItem('derimodHedefPhoneApp', JSON.stringify({ globalOsf, employees, showOsfPanel }));
                setSaveMessage('Kaydedildi!');
                setTimeout(() => setSaveMessage(''), 3000);
            };

            const calcCatRev = (adet, osf) => (parseFloat(adet) || 0) * (parseFloat(osf) || 0);
            const calcTotalTarget = (emp) => calcCatRev(emp.ayakkabiAdet, globalOsf.ayakkabi) + calcCatRev(emp.giysiAdet, globalOsf.giysi) + calcCatRev(emp.cantaAdet, globalOsf.canta) + calcCatRev(emp.aksesuarAdet, globalOsf.aksesuar);
            const calcPercent = (target, realized) => target <= 0 && realized > 0 ? 100 : target <= 0 ? 0 : ((realized / target) * 100);

            const storeTotals = employees.reduce((acc, emp) => {
                acc.ayCiro += calcCatRev(emp.ayakkabiAdet, globalOsf.ayakkabi); 
                acc.giCiro += calcCatRev(emp.giysiAdet, globalOsf.giysi);
                acc.caCiro += calcCatRev(emp.cantaAdet, globalOsf.canta); 
                acc.akCiro += calcCatRev(emp.aksesuarAdet, globalOsf.aksesuar);
                acc.topHedef += calcTotalTarget(emp); 
                acc.topGerc += parseFloat(emp.gerceklesenCiro) || 0;
                return acc;
            }, { ayCiro: 0, giCiro: 0, caCiro: 0, akCiro: 0, topHedef: 0, topGerc: 0 });

            const storePercentage = calcPercent(storeTotals.topHedef, storeTotals.topGerc);

            const ProgressBar = ({ percent }) => {
                const clamped = Math.min(Math.max(percent, 0), 100);
                let colorClass = 'bg-red-500';
                if (percent >= 50 && percent < 80) colorClass = 'bg-amber-500';
                if (percent >= 80 && percent < 100) colorClass = 'bg-blue-500';
                if (percent >= 100) colorClass = 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]';

                return (
                <div className="flex flex-col items-center gap-0.5 w-14 sm:w-20 landscape:w-16">
                    <span className={`font-bold text-[10px] sm:text-xs landscape:text-[10px] ${percent >= 100 ? 'text-green-600' : 'text-neutral-700'}`}>
                    %{percent.toFixed(1)}
                    </span>
                    <div className="w-full bg-neutral-200 rounded-full h-1.5 overflow-hidden shadow-inner border border-neutral-300">
                    <div className={`h-full rounded-full transition-all duration-500 ease-out ${colorClass}`} style={{ width: `${clamped}%` }}></div>
                    </div>
                </div>
                );
            };

            return (
                <div className={`bg-neutral-100 font-sans transition-all duration-300 ${isFullscreen ? 'p-0 h-screen overflow-hidden flex flex-col' : 'min-h-screen p-2 sm:p-4 md:p-8 landscape:p-1'}`}>
                
                <div className={`mx-auto w-full transition-all ${isFullscreen ? 'max-w-full h-full flex flex-col space-y-0' : 'max-w-[1400px] space-y-4 sm:space-y-6 landscape:space-y-2'}`}>
                    
                    {/* Header & OSF Paneli */}
                    <div className={`bg-white shadow-md overflow-hidden border border-neutral-200 transition-all ${isFullscreen ? 'rounded-none border-0 flex-shrink-0' : 'rounded-xl'}`}>
                    
                    <div className={`bg-black text-white flex flex-row justify-between items-center relative transition-all ${isFullscreen || window.innerHeight < 500 ? 'p-2' : 'p-4 sm:p-6 flex-col md:flex-row'}`}>
                        <div className={`flex items-center gap-3 ${isFullscreen ? 'mb-0' : 'mb-3 md:mb-0'}`}>
                        <h1 className={`font-serif tracking-widest uppercase m-0 ${isFullscreen || window.innerHeight < 500 ? 'text-xl' : 'text-2xl sm:text-3xl'}`}>DERİMOD</h1>
                        {!isFullscreen && <h2 className="text-xs sm:text-sm text-neutral-400 tracking-wider hidden sm:block mt-1">Hedef Paneli</h2>}
                        </div>

                        <div className="flex flex-row items-center gap-2 sm:gap-4">
                        <div className="text-[10px] sm:text-xs text-neutral-400 hidden sm:block">
                            {new Date().toLocaleDateString('tr-TR')}
                        </div>
                        
                        {/* OSF Şalteri */}
                        <div className="flex items-center gap-1.5 sm:gap-2 bg-neutral-800 px-2 py-1 sm:px-3 sm:py-1.5 rounded-full border border-neutral-700">
                            <span className="text-[10px] sm:text-xs text-neutral-400 font-medium hidden sm:inline">OSF</span>
                            <button 
                            onClick={() => setShowOsfPanel(!showOsfPanel)}
                            className={`relative inline-flex h-5 w-9 sm:h-6 sm:w-11 items-center rounded-full transition-colors focus:outline-none ${showOsfPanel ? 'bg-amber-500' : 'bg-neutral-600'}`}
                            >
                            <span className={`inline-block h-3.5 w-3.5 sm:h-4 sm:w-4 transform rounded-full bg-white transition-transform ${showOsfPanel ? 'translate-x-5 sm:translate-x-6' : 'translate-x-1'}`} />
                            </button>
                            <div className="text-neutral-400 w-3 sm:w-4 flex justify-center">
                            {showOsfPanel ? <i className="fa-solid fa-eye text-amber-400 text-xs"></i> : <i className="fa-solid fa-eye-slash text-xs"></i>}
                            </div>
                        </div>

                        {/* Tam Ekran Butonu */}
                        <button 
                            onClick={toggleFullscreen}
                            className="bg-neutral-800 hover:bg-neutral-700 text-white p-1.5 sm:p-2 rounded-lg border border-neutral-700 transition-colors flex items-center gap-1"
                        >
                            {isFullscreen ? <i className="fa-solid fa-compress text-amber-400"></i> : <i className="fa-solid fa-expand"></i>}
                            <span className="text-[10px] sm:text-xs font-medium hidden sm:inline">{isFullscreen ? 'Çık' : 'Tam Ekran'}</span>
                        </button>
                        </div>
                    </div>

                    {/* OSF Alanı */}
                    <div className={`transition-all duration-500 ease-in-out origin-top ${showOsfPanel ? 'opacity-100 max-h-[500px] p-3 sm:p-6 border-b border-neutral-200' : 'opacity-0 max-h-0 overflow-hidden py-0 border-b-0 border-transparent'}`}>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-4">
                        {['ayakkabi', 'giysi', 'canta', 'aksesuar'].map((cat, idx) => {
                            const icons = [<i className="fa-solid fa-shoe-prints text-amber-600"></i>, <i className="fa-solid fa-shirt text-blue-600"></i>, <i className="fa-solid fa-bag-shopping text-rose-600"></i>, <i className="fa-solid fa-glasses text-emerald-600"></i>];
                            const labels = ['Ayakkabı', 'Giysi', 'Çanta', 'Aksesuar'];
                            const colors = ['focus:ring-amber-500', 'focus:ring-blue-500', 'focus:ring-rose-500', 'focus:ring-emerald-500'];
                            
                            return (
                            <div key={cat} className="bg-white p-2 sm:p-3 rounded-lg border border-neutral-200 shadow-sm flex flex-col">
                                <label className="text-[10px] sm:text-xs font-bold text-neutral-500 uppercase tracking-wider mb-1 sm:mb-2 flex items-center gap-1 sm:gap-2">
                                {icons[idx]} {labels[idx]}
                                </label>
                                <div className="relative">
                                <input type="text" value={globalOsf[cat]} onChange={(e) => handleOsfChange(cat, e.target.value)}
                                    className={`w-full text-sm sm:text-lg font-semibold text-black p-1 sm:p-2 bg-neutral-50 border border-neutral-300 rounded focus:outline-none focus:ring-1 sm:focus:ring-2 focus:bg-white transition-all pl-6 sm:pl-7 ${colors[idx]}`} placeholder="0" />
                                <span className="absolute left-2 sm:left-3 top-1/2 transform -translate-y-1/2 text-neutral-400 font-semibold text-xs sm:text-sm">₺</span>
                                </div>
                            </div>
                            );
                        })}
                        </div>
                    </div>
                    </div>

                    {/* Tablo Alanı */}
                    <div className={`bg-white shadow-md overflow-hidden border border-neutral-200 flex flex-col transition-all ${isFullscreen ? 'flex-grow rounded-none border-x-0 border-b-0' : 'rounded-xl'}`}>
                    
                    <div className="p-2 sm:p-3 bg-white border-b border-neutral-200 flex flex-row justify-between gap-2 items-center flex-shrink-0">
                        <form onSubmit={handleAddEmployee} className="flex flex-row flex-grow md:flex-grow-0 gap-1 sm:gap-2">
                        <input 
                            type="text" placeholder="Personel Adı" 
                            className="px-2 py-1 sm:px-3 sm:py-1.5 text-xs sm:text-sm border border-neutral-300 rounded-md focus:outline-none focus:ring-1 focus:ring-black flex-grow md:w-48"
                            value={newEmpName} onChange={(e) => setNewEmpName(e.target.value)}
                        />
                        <button type="submit" className="bg-black text-white px-2 py-1 sm:px-3 sm:py-1.5 rounded-md flex items-center gap-1 sm:gap-2 hover:bg-neutral-800">
                            <i className="fa-solid fa-user-plus"></i>
                            <span className="text-xs sm:text-sm hidden sm:inline">Ekle</span>
                        </button>
                        </form>

                        <div className="flex items-center gap-2">
                        {saveMessage && <span className="text-green-600 font-medium text-[10px] sm:text-xs bg-green-50 px-2 py-0.5 rounded border border-green-200">{saveMessage}</span>}
                        <button onClick={handleSave} className="bg-green-600 text-white px-3 py-1 sm:px-4 sm:py-1.5 rounded-md flex items-center gap-1 sm:gap-2 hover:bg-green-700 shadow-sm">
                            <i className="fa-solid fa-floppy-disk"></i>
                            <span className="text-xs sm:text-sm hidden sm:inline">Kaydet</span>
                        </button>
                        </div>
                    </div>

                    {/* Scrollable Tablo Container */}
                    <div className="overflow-x-auto overflow-y-auto flex-grow styled-scrollbar">
                        <table className="w-full text-left whitespace-nowrap table-auto min-w-max">
                        <thead className="text-[10px] sm:text-xs text-neutral-700 uppercase bg-neutral-100 border-b-2 border-neutral-300 sticky top-0 z-20">
                            <tr>
                            <th rowSpan="2" className="px-2 py-1 sm:px-3 sm:py-2 border-r border-neutral-300 font-bold sticky left-0 bg-neutral-100 z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">Personel</th>
                            <th colSpan="2" className="px-1 py-1 text-center border-r border-neutral-300 bg-amber-50 text-amber-900">Ayakkabı</th>
                            <th colSpan="2" className="px-1 py-1 text-center border-r border-neutral-300 bg-blue-50 text-blue-900">Giysi</th>
                            <th colSpan="2" className="px-1 py-1 text-center border-r border-neutral-300 bg-rose-50 text-rose-900">Çanta</th>
                            <th colSpan="2" className="px-1 py-1 text-center border-r border-neutral-300 bg-emerald-50 text-emerald-900">Aksesuar</th>
                            <th rowSpan="2" className="px-1 py-1 sm:px-2 sm:py-2 text-center border-r border-neutral-300 font-bold bg-neutral-800 text-white leading-tight">Hedef<br/>Ciro</th>
                            <th rowSpan="2" className="px-1 py-1 sm:px-2 sm:py-2 text-center border-r border-neutral-300 font-bold bg-indigo-50 text-indigo-900 leading-tight">Gerçekleşen<br/>Ciro</th>
                            <th rowSpan="2" className="px-1 py-1 sm:px-2 sm:py-2 text-center border-r border-neutral-300 font-bold bg-neutral-50 leading-tight">Başarı<br/>(%)</th>
                            <th rowSpan="2" className="px-1 py-1 text-center font-bold">Sil</th>
                            </tr>
                            <tr className="text-neutral-500 text-[9px] sm:text-[10px] landscape:text-[9px]">
                            <th className="px-1 border-r border-t border-neutral-300 bg-amber-100/50">Adet</th><th className="px-1 border-r border-t border-neutral-300 bg-amber-50">Ciro</th>
                            <th className="px-1 border-r border-t border-neutral-300 bg-blue-100/50">Adet</th><th className="px-1 border-r border-t border-neutral-300 bg-blue-50">Ciro</th>
                            <th className="px-1 border-r border-t border-neutral-300 bg-rose-100/50">Adet</th><th className="px-1 border-r border-t border-neutral-300 bg-rose-50">Ciro</th>
                            <th className="px-1 border-r border-t border-neutral-300 bg-emerald-100/50">Adet</th><th className="px-1 border-r border-t border-neutral-300 bg-emerald-50">Ciro</th>
                            </tr>
                        </thead>
                        <tbody className="text-[10px] sm:text-xs">
                            {employees.length === 0 ? (
                            <tr><td colSpan="13" className="px-4 py-8 text-center text-neutral-400 italic">Henüz personel eklenmedi.</td></tr>
                            ) : (
                            employees.map((emp) => {
                                const empTarget = calcTotalTarget(emp);
                                const empRealized = parseFloat(emp.gerceklesenCiro) || 0;
                                return (
                                <tr key={emp.id} className="border-b border-neutral-200 hover:bg-neutral-50 transition-colors">
                                    <td className="px-2 py-1 font-medium text-black border-r border-neutral-200 sticky left-0 bg-white z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] max-w-[80px] sm:max-w-[120px] truncate overflow-hidden" title={emp.name}>
                                    {emp.name}
                                    </td>
                                    
                                    <td className="p-0.5 sm:p-1 border-r border-neutral-200 bg-amber-50/50">
                                    <input type="text" value={emp.ayakkabiAdet} onChange={(e) => handleEmployeeChange(emp.id, 'ayakkabiAdet', e.target.value)} 
                                        className="w-8 sm:w-10 landscape:w-8 p-1 text-center bg-white border border-neutral-200 rounded focus:border-amber-400 focus:outline-none focus:ring-1 font-semibold text-black" placeholder="0" />
                                    </td>
                                    <td className="px-1 py-1 text-center text-amber-700 border-r border-neutral-200 bg-amber-50/20">{calcCatRev(emp.ayakkabiAdet, globalOsf.ayakkabi).toLocaleString('tr-TR')}</td>

                                    <td className="p-0.5 sm:p-1 border-r border-neutral-200 bg-blue-50/50">
                                    <input type="text" value={emp.giysiAdet} onChange={(e) => handleEmployeeChange(emp.id, 'giysiAdet', e.target.value)} 
                                        className="w-8 sm:w-10 landscape:w-8 p-1 text-center bg-white border border-neutral-200 rounded focus:border-blue-400 focus:outline-none focus:ring-1 font-semibold text-black" placeholder="0" />
                                    </td>
                                    <td className="px-1 py-1 text-center text-blue-700 border-r border-neutral-200 bg-blue-50/20">{calcCatRev(emp.giysiAdet, globalOsf.giysi).toLocaleString('tr-TR')}</td>

                                    <td className="p-0.5 sm:p-1 border-r border-neutral-200 bg-rose-50/50">
                                    <input type="text" value={emp.cantaAdet} onChange={(e) => handleEmployeeChange(emp.id, 'cantaAdet', e.target.value)} 
                                        className="w-8 sm:w-10 landscape:w-8 p-1 text-center bg-white border border-neutral-200 rounded focus:border-rose-400 focus:outline-none focus:ring-1 font-semibold text-black" placeholder="0" />
                                    </td>
                                    <td className="px-1 py-1 text-center text-rose-700 border-r border-neutral-200 bg-rose-50/20">{calcCatRev(emp.cantaAdet, globalOsf.canta).toLocaleString('tr-TR')}</td>

                                    <td className="p-0.5 sm:p-1 border-r border-neutral-200 bg-emerald-50/50">
                                    <input type="text" value={emp.aksesuarAdet} onChange={(e) => handleEmployeeChange(emp.id, 'aksesuarAdet', e.target.value)} 
                                        className="w-8 sm:w-10 landscape:w-8 p-1 text-center bg-white border border-neutral-200 rounded focus:border-emerald-400 focus:outline-none focus:ring-1 font-semibold text-black" placeholder="0" />
                                    </td>
                                    <td className="px-1 py-1 text-center text-emerald-700 border-r border-neutral-200 bg-emerald-50/20">{calcCatRev(emp.aksesuarAdet, globalOsf.aksesuar).toLocaleString('tr-TR')}</td>

                                    <td className="px-1 sm:px-2 py-1 text-center font-bold text-neutral-600 border-r border-neutral-200 bg-neutral-100">
                                    {empTarget.toLocaleString('tr-TR', { maximumFractionDigits: 0 })} ₺
                                    </td>

                                    <td className="p-0.5 sm:p-1 border-r border-neutral-200 bg-indigo-50/30">
                                    <div className="flex justify-center">
                                        <input type="text" value={emp.gerceklesenCiro} onChange={(e) => handleEmployeeChange(emp.id, 'gerceklesenCiro', e.target.value)} 
                                        className="w-16 sm:w-20 landscape:w-16 p-1 sm:p-1.5 text-center bg-white border border-indigo-200 rounded-md focus:border-indigo-500 focus:outline-none focus:ring-1 font-bold text-indigo-900" placeholder="0" />
                                    </div>
                                    </td>

                                    <td className="px-1 py-1 flex justify-center items-center h-full border-r border-neutral-200 bg-white">
                                    <ProgressBar percent={calcPercent(empTarget, empRealized)} />
                                    </td>

                                    <td className="px-1 py-1 text-center">
                                    <button onClick={() => handleDeleteEmployee(emp.id)} className="text-neutral-400 hover:text-red-500 transition-colors">
                                        <i className="fa-solid fa-trash"></i>
                                    </button>
                                    </td>
                                </tr>
                                );
                            })
                            )}
                        </tbody>
                        
                        {/* Footer */}
                        {employees.length > 0 && (
                            <tfoot className="text-[10px] sm:text-xs font-medium border-t-2 border-neutral-400 sticky bottom-0 z-20">
                            <tr className="bg-black text-white shadow-[0_-2px_5px_rgba(0,0,0,0.1)]">
                                <td className="px-2 py-2 sticky left-0 bg-black z-30 border-r border-neutral-800 font-bold text-green-400 text-[10px] sm:text-xs whitespace-normal sm:whitespace-nowrap leading-tight">MAĞAZA<br/>CİRO & %</td>
                                <td colSpan="2" className="px-1 py-2 text-center border-r border-neutral-800 text-amber-100">{storeTotals.ayCiro.toLocaleString('tr-TR')} ₺</td>
                                <td colSpan="2" className="px-1 py-2 text-center border-r border-neutral-800 text-blue-100">{storeTotals.giCiro.toLocaleString('tr-TR')} ₺</td>
                                <td colSpan="2" className="px-1 py-2 text-center border-r border-neutral-800 text-rose-100">{storeTotals.caCiro.toLocaleString('tr-TR')} ₺</td>
                                <td colSpan="2" className="px-1 py-2 text-center border-r border-neutral-800 text-emerald-100">{storeTotals.akCiro.toLocaleString('tr-TR')} ₺</td>
                                <td className="px-1 py-2 text-center font-bold text-neutral-300 border-r border-neutral-800">
                                H: {storeTotals.topHedef.toLocaleString('tr-TR', { maximumFractionDigits: 0 })}
                                </td>
                                <td className="px-1 py-2 text-center font-bold text-indigo-300 border-r border-neutral-800">
                                G: {storeTotals.topGerc.toLocaleString('tr-TR', { maximumFractionDigits: 0 })}
                                </td>
                                <td className="px-1 py-2 flex justify-center items-center border-r border-neutral-800 bg-neutral-900">
                                <ProgressBar percent={storePercentage} />
                                </td>
                                <td className="bg-black"></td>
                            </tr>
                            </tfoot>
                        )}
                        </table>
                    </div>
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
